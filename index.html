<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>活动酒店房间分配系统</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <span></span><span></span><span></span>
          </div>
          <div>
            <h1>活动房务</h1>
          </div>
        </div>
        <nav class="nav" aria-label="主要视图">
          <button class="nav-item active" data-view="dashboard">总览</button>
          <button class="nav-item" data-view="needs">入住需求</button>
          <button class="nav-item" data-view="calendar">酒店统计</button>
          <button class="nav-item" data-view="roleStats">角色统计</button>
        </nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h2 id="viewTitle">总览</h2>
          </div>
          <div class="toolbar">
            <label class="search">
              <span>搜索</span>
              <input id="searchInput" type="search" placeholder="姓名、酒店、房间号">
            </label>
            <span class="upload-progress" id="uploadProgress" hidden>上传 0 / 0</span>
            <span class="sync-status" id="syncStatus">正在连接共享数据</span>
          </div>
        </header>

        <section class="view active" id="dashboardView" aria-labelledby="viewTitle">
          <div class="kpi-grid" id="kpiGrid"></div>
          <div class="dashboard-grid">
            <section class="panel">
              <div class="panel-header">
                <div>
                  <h3>今日待处理</h3>
                  <p>优先补齐酒店和房间号。</p>
                </div>
              </div>
              <div class="task-list" id="taskList"></div>
            </section>
            <section class="panel">
              <div class="panel-header">
                <div>
                  <h3>人员性质分布</h3>
                  <p>看工作人员、评委、嘉宾、家长等人数。</p>
                </div>
              </div>
              <div class="bars" id="useBars"></div>
            </section>
            <section class="panel heat-panel">
              <div class="panel-header">
                <div>
                  <h3>酒店日期统计</h3>
                  <p>按酒店和入住日期查看各房型安排数量。</p>
                </div>
              </div>
              <div class="heatmap-wrap">
                <div class="heatmap" id="heatmap"></div>
              </div>
            </section>
          </div>
        </section>

        <section class="view" id="calendarView" aria-labelledby="viewTitle">
          <div class="filter-row">
            <label>人员性质
              <select id="calendarIdentity"></select>
            </label>
            <div class="dialog-field calendar-date-range">
              <span class="dialog-field-label">日期范围</span>
              <div class="date-range-picker" data-date-range data-calendar-range>
                <input id="calendarStartInput" type="hidden" data-range-hidden-start>
                <input id="calendarEndInput" type="hidden" data-range-hidden-end>
                <button class="date-range-trigger" type="button" data-range-trigger>
                  <span data-range-summary>开始日期 至 结束日期</span>
                  <span class="date-range-calendar-icon" aria-hidden="true"></span>
                </button>
                <div class="date-range-panel" data-range-panel hidden>
                  <input type="hidden" data-range-start>
                  <input type="hidden" data-range-end>
                  <div class="date-range-body">
                    <div class="date-calendar">
                      <div class="date-calendar-head">
                        <button type="button" data-range-month-nav="-12">«</button>
                        <button type="button" data-range-month-nav="-1">‹</button>
                        <strong data-range-month-title>2026 年 8 月</strong>
                        <button type="button" data-range-month-nav="1">›</button>
                        <button type="button" data-range-month-nav="12">»</button>
                      </div>
                      <div class="date-week-row">
                        <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
                      </div>
                      <div class="date-grid" data-range-calendar></div>
                    </div>
                  </div>
                  <div class="date-range-footer">
                    <span data-range-draft>请选择开始日期和结束日期</span>
                    <button class="primary-btn" type="button" data-range-apply>确认</button>
                  </div>
                </div>
              </div>
            </div>
            <button class="ghost-btn stats-export-btn" id="exportHotelStatsBtn" type="button">导出当前信息</button>
          </div>
          <div class="legend">
            <span class="legend-item room-type-standard">双标</span>
            <span class="legend-item room-type-king">大床</span>
            <span class="legend-item room-type-suite">套房</span>
            <span class="legend-item room-type-other">其他</span>
            <span class="legend-item room-type-empty">暂无</span>
          </div>
          <div class="board" id="roomBoard"></div>
        </section>

        <section class="view" id="needsView" aria-labelledby="viewTitle">
          <div class="table-actions">
            <button class="primary-btn" id="addNeedBtn" type="button">新增需求</button>
            <button class="ghost-btn" id="downloadNeedTemplateBtn" type="button">下载上传模板</button>
            <label class="ghost-btn file-btn">
              批量上传需求
              <input id="needBatchInput" type="file" accept=".csv,.xls,.xlsx,.html,text/csv,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet">
            </label>
            <button class="ghost-btn" id="exportCurrentNeedsBtn" type="button">导出当前信息</button>
            <span id="needsSummary"></span>
          </div>
          <div class="filter-row needs-filter-row">
            <label>酒店筛选
              <select id="needHotelFilter"></select>
            </label>
            <label>人员性质筛选
              <select id="needIdentityFilter"></select>
            </label>
          </div>
          <div class="table-wrap">
            <table id="needsTable"></table>
          </div>
        </section>

        <section class="view" id="roleStatsView" aria-labelledby="viewTitle">
          <div class="filter-row">
            <label>酒店
              <select id="roleHotel"></select>
            </label>
            <div class="dialog-field calendar-date-range">
              <span class="dialog-field-label">日期范围</span>
              <div class="date-range-picker" data-date-range data-role-range>
                <input id="roleStartInput" type="hidden" data-range-hidden-start>
                <input id="roleEndInput" type="hidden" data-range-hidden-end>
                <button class="date-range-trigger" type="button" data-range-trigger>
                  <span data-range-summary>开始日期 至 结束日期</span>
                  <span class="date-range-calendar-icon" aria-hidden="true"></span>
                </button>
                <div class="date-range-panel" data-range-panel hidden>
                  <input type="hidden" data-range-start>
                  <input type="hidden" data-range-end>
                  <div class="date-range-body">
                    <div class="date-calendar">
                      <div class="date-calendar-head">
                        <button type="button" data-range-month-nav="-12">«</button>
                        <button type="button" data-range-month-nav="-1">‹</button>
                        <strong data-range-month-title>2026 年 8 月</strong>
                        <button type="button" data-range-month-nav="1">›</button>
                        <button type="button" data-range-month-nav="12">»</button>
                      </div>
                      <div class="date-week-row">
                        <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
                      </div>
                      <div class="date-grid" data-range-calendar></div>
                    </div>
                  </div>
                  <div class="date-range-footer">
                    <span data-range-draft>请选择开始日期和结束日期</span>
                    <button class="primary-btn" type="button" data-range-apply>确认</button>
                  </div>
                </div>
              </div>
            </div>
            <button class="ghost-btn stats-export-btn" id="exportRoleStatsBtn" type="button">导出当前信息</button>
          </div>
          <div class="legend">
            <span class="legend-item room-type-standard">双标</span>
            <span class="legend-item room-type-king">大床</span>
            <span class="legend-item room-type-suite">套房</span>
            <span class="legend-item room-type-other">其他</span>
            <span class="legend-item room-type-empty">暂无</span>
          </div>
          <div class="board" id="roleStatsBoard"></div>
        </section>

      </main>
    </div>

    <dialog id="editDialog">
      <form method="dialog" class="dialog-card" id="dialogForm">
        <h3 id="dialogTitle">编辑</h3>
        <div id="dialogFields" class="dialog-fields"></div>
        <div class="dialog-actions">
          <button class="ghost-btn" value="cancel" type="button" id="dialogCancel">取消</button>
          <button class="primary-btn" value="default" type="submit">保存</button>
        </div>
      </form>
    </dialog>

    <dialog id="uploadDialog">
      <div class="upload-dialog-card">
        <h3 id="uploadDialogTitle">上传提示</h3>
        <p id="uploadDialogMessage"></p>
        <div class="upload-dialog-meta" id="uploadDialogMeta"></div>
        <div class="dialog-actions">
          <button class="ghost-btn" type="button" id="uploadSecondaryBtn">取消上传</button>
          <button class="primary-btn" type="button" id="uploadPrimaryBtn">继续上传</button>
        </div>
      </div>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
